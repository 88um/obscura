name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    # Build on Ubuntu 22.04 so the Linux release binary works on common
    # LTS servers with glibc 2.35 instead of requiring the newer glibc
    # shipped by ubuntu-latest.
    runs-on: ubuntu-22.04

    env:
      TARGET: x86_64-unknown-linux-gnu
      ARTIFACT_NAME: obscura-x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Build
        run: cargo build --release --target ${{ env.TARGET }}

      - name: Package
        run: |
          cd target/${{ env.TARGET }}/release
          tar czf ../../../${{ env.ARTIFACT_NAME }}.tar.gz obscura obscura-worker
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}.tar.gz
